version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: seventoop_postgres
    environment:
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: password
      POSTGRES_DB: seventoop
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
