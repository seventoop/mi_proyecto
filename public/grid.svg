<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Main grid lines -->
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(100,116,139,0.05)" stroke-width="1"/>
      
      <!-- Accent dots at intersections -->
      <circle cx="0" cy="0" r="1.5" fill="rgba(139,195,74,0.1)"/>
      <circle cx="50" cy="0" r="1" fill="rgba(139,195,74,0.08)"/>
      <circle cx="0" cy="50" r="1" fill="rgba(139,195,74,0.08)"/>
      <circle cx="50" cy="50" r="0.75" fill="rgba(139,195,74,0.06)"/>
    </pattern>
  </defs>
  
  <rect width="100" height="100" fill="url(#grid)" />
</svg>
